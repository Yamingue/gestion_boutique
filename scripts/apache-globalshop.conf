#
# Virtual Host Apache — Global Shop
# À copier dans : C:\laragon\etc\apache2\sites-enabled\globalshop.conf
#
# Ensuite redémarrer Apache dans Laragon.
#
# Accès : http://globalshop.test  (ou l'IP du bureau)
#

<VirtualHost *:80>
    ServerName globalshop.test
    # ServerName 192.168.1.XX   ← décommenter avec l'IP locale pour accès réseau

    # Proxy vers le serveur Next.js sur le port 3000
    ProxyRequests     Off
    ProxyPreserveHost On

    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Headers pour que Next.js reçoive le bon protocole
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}e"

    # Logs
    ErrorLog  "logs/globalshop-error.log"
    CustomLog "logs/globalshop-access.log" combined
</VirtualHost>
